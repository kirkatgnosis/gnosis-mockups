document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

4deg)}30%,88%{transform:scaleX(1) skewX(-4deg)}100%{transform:scaleX(0) skewX(-4deg)}}\n@keyframes gx-markbg{0%,10%{background-position:100% 0}30%,88%{background-position:0 0}100%{background-position:100% 0}}\n#gx-email{background:transparent;border:0;outline:0;font:400 15px 'Space Grotesk',sans-serif;color:#F4F1E8}\n#gx-email::placeholder{color:#17150F;opacity:1}\n@keyframes gx-dot-b{0%,80%,100%{transform:translateY(0);opacity:.45}40%{transform:translateY(-3px);opacity:1}}\n@keyframes gx-caret-blink{0%,49%{opacity:1}50%,100%{opacity:0}}\n#gx-lisa-dots{display:inline-flex;align-items:center;gap:3px}\n#gx-lisa-dots span{width:4px;height:4px;border-radius:50%;background:#17150F;animation:gx-dot-b 1.1s ease-in-out infinite}\n#gx-lisa-dots span:nth-child(2){animation-delay:.15s}\n#gx-lisa-dots span:nth-child(3){animation-delay:.3s}\n#gx-lisa-caret{display:inline-block;width:1.5px;height:1em;background:#17150F;margin-left:1px;vertical-align:-2px;animation:gx-caret-blink 1s steps(1) infinite}\n<\u002Fstyle>\n<script>\n(function(){\n  function init(){\n    var dots=document.getElementById('gx-lisa-dots');\n    var text=document.getElementById('gx-lisa-text');\n    var caret=document.getElementById('gx-lisa-caret');\n    if(!dots||!text||!caret) return false;\n    if(dots.getAttribute('data-gx-init')) return true;\n    dots.setAttribute('data-gx-init','1');\n    var full=dots.getAttribute('data-full')||'';\n    function reset(){dots.style.display='inline-flex';text.textContent='';caret.style.display='none';}\n    function run(){\n      reset();\n      setTimeout(function(){\n        dots.style.display='none';\n        caret.style.display='inline-block';\n        var i=0;\n        (function step(){\n          text.textContent=full.slice(0,i);\n          i++;\n          if(i<=full.length){setTimeout(step,38);}\n          else{setTimeout(run,6000);}\n        })();\n      },1400);\n    }\n    run();\n    return true;\n  }\n  if(!init()){\n    var iv=setInterval(function(){ if(init()) clearInterval(iv); },120);\n    setTimeout(function(){clearInterval(iv);},15000);\n  }\n})();\n<\u002Fscript>\n<\u002Fhelmet>\n\n\n\n<div id=\"gx-page\" style=\"width:1200px;margin:0 auto;background:#F4F1E8;transform-origin:top center\">\n\n<!-- ============ NAV ============ -->\n<div style=\"position:sticky;top:0;z-index:50;display:flex;align-items:center;justify-content:space-between;padding:16px 44px;background:rgba(185,214,222,.55);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);border-bottom:1px solid rgba(23,21,15,.12)\">\n<div style=\"display:flex;align-items:center;gap:11px\">\n\n<span style=\"font: 400 24px 'Instrument Serif',serif; letter-spacing: .01em; font-size: 36px; font-weight: 400\">Gnosis<\u002Fspan>\n<span style=\"font: 700 10px 'Space Mono',monospace; letter-spacing: .1em; padding: 2px 6px; background: #17150F; color: #F4F1E8; border-radius: 4px; font-size: 20px\">ACT<\u002Fspan>\n<\u002Fdiv>\n<div style=\"display:flex;align-items:center;gap:30px\">\n\n<span style=\"font: 700 13px 'Space Grotesk',sans-serif; color: #FFFFFF; background: #D56A54; padding: 10px 18px; border-radius: 7px; font-size: 16px\">Join the waitlist<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ HERO ============ -->\n<div style=\"display:grid;grid-template-columns:0.82fr 1.18fr;gap:0;align-items:center\">\n<div style=\"padding:64px 36px 64px 44px\">\n<div style=\"margin-bottom:24px\">\n<span style=\"position:relative;font:700 11px 'Space Mono',monospace;letter-spacing:.13em;color:#17150F;padding:4px 8px;display:inline-block\"><span style=\"position:absolute;inset:0;background:#C2EE45;transform:skewX(-6deg)\"><\u002Fspan><span style=\"position: relative; font-size: 13px\">NOT A CHATBOT<\u002Fspan><\u002Fspan>\n<\u002Fdiv>\n<h1 style=\"margin:0;font:400 54px/1.08 'Instrument Serif',serif;letter-spacing:-.01em;max-width:480px\">An ACT prep tutor who knows <span style=\"position:relative;white-space:nowrap\"><span style=\"position:absolute;left:-4px;right:-4px;top:16%;bottom:12%;background:#C2EE45;transform:scaleX(0) skewX(-4deg);transform-origin:left;animation:gx-mark 5.5s ease-in-out infinite;z-index:0\"><\u002Fspan><span style=\"position:relative;z-index:1\">how you think.<\u002Fspan><\u002Fspan><\u002Fh1>\n\n<p style=\"margin: 26px 0 0; font: 400 16px/1.55 'Space Grotesk',sans-serif; color: rgba(23,21,15,.74); max-width: 380px; font-family: Space Grotesk, sans-serif\">Your ACT score is stuck . . . but not for the reason you think. You know the material on the test. The problem? You don't know how to&nbsp;<b>think about your thinking&nbsp;<\u002Fb>while taking the test.<b style=\"color: rgb(213, 106, 84); font-family: &quot;Instrument Serif&quot;, serif; font-size: 20px;\"><span style=\"font-weight: 800;\"><b style=\"color: rgb(0, 0, 0); font-family: &quot;Instrument Serif&quot;;\"><br><\u002Fb><\u002Fspan><\u002Fb><br><b>Gnosis ACT<\u002Fb> is an AI tutoring platform that helps you do just that.<b> <\u002Fb>Our<b> <\u002Fb>AI tutor Lisa<b> <\u002Fb>shifts your&nbsp;<b><\u002Fb>reactive, panicky \"test thinking\" to the higher order kind of thinking known as&nbsp;<b>metacognition<\u002Fb>. <br><br>Thinking about how we think is a skill that makes us human. Gnosis ACT is making it test prep.<br><\u002Fp><div style=\"display:flex;align-items:center;gap:14px;margin-top:32px\">\n<span style=\"font: 600 14px 'Space Grotesk',sans-serif; color: #FFFFFF; padding: 14px 24px; border-radius: 8px; font-size: 17px; background-color: #D56A54\">Join the waitlist →<\u002Fspan>\n\n<\u002Fdiv>\n<div style=\"margin-top: 16px; font: 400 12px 'Space Mono',monospace; letter-spacing: .03em; color: #17150F\"><b>▪ Limited beta spots&nbsp;<\u002Fb><\u002Fdiv>\n<\u002Fdiv>\n<div style=\"padding:44px 44px 44px 24px\">\n<div style=\"background:#F4F1E8;border:1.5px solid #17150F;border-radius:14px;box-shadow:8px 8px 0 rgba(36,106,114,.18);overflow:hidden\">\n<div style=\"padding: 18px 24px 16px; background-color: #FFFFFF\">\n<div style=\"display:flex;justify-content:space-between;margin-bottom:11px\">\n<span style=\"font: 700 9.5px 'Space Mono',monospace; letter-spacing: .12em; color: #246A72; font-size: 12px\">READING · SOCIAL SCIENCE<\u002Fspan>\n<span style=\"font: 700 9.5px 'Space Mono',monospace; letter-spacing: .12em; color: #246A72; font-size: 12px\">PASSAGE 3<\u002Fspan>\n<\u002Fdiv>\n<div style=\"font: 400 18px/1.2 'Instrument Serif',serif; margin-bottom: 9px; font-size: 24px\">The Psychology of Everyday Objects<\u002Fdiv>\n<p style=\"margin:0;font:400 12.5px/1.6 'Space Grotesk',sans-serif;color:rgba(23,21,15,.7)\">In 1988, cognitive scientist Donald Norman introduced the idea of <i>affordances<\u002Fi>. <span style=\"background:rgba(194,238,69,.6);-webkit-box-decoration-break:clone;box-decoration-break:clone;padding:1px 2px;color:#17150F\">An object's design should signal how it can be used — when it doesn't, the design has failed its user, not the other way around.<\u002Fspan><\u002Fp>\n<\u002Fdiv>\n<div style=\"display: flex; align-items: center; gap: 9px; padding: 11px 24px; border-top: 1px solid rgba(23,21,15,.12); border-bottom: 1px solid rgba(23,21,15,.12); background-color: #B9D6DE8C\">\n<span style=\"width:8px;height:8px;border-radius:50%;background:#246A72\"><\u002Fspan>\n<span style=\"font:600 13px 'Space Grotesk',sans-serif\">Lisa<\u002Fspan>\n\n<span style=\"font: 400 12px 'Space Grotesk',sans-serif; color: #17150F; font-style: normal; font-size: 11.5px\"><b><span id=\"gx-lisa-dots\" data-full=\"This one's like the practice questions you kept changing yesterday, Anne.\"><span><\u002Fspan><span><\u002Fspan><span><\u002Fspan><\u002Fspan><span id=\"gx-lisa-text\"><\u002Fspan><span id=\"gx-lisa-caret\" style=\"display:none\"><\u002Fspan><\u002Fb><\u002Fspan>\n<\u002Fdiv>\n<div style=\"padding: 18px 24px 20px; background-color: #FFFFFF\">\n<div style=\"font: 700 9.5px 'Space Mono',monospace; letter-spacing: .12em; color: #246A72; margin-bottom: 10px\">QUESTION 1 OF 4<\u002Fdiv>\n<p style=\"margin: 0 0 14px; font: 400 17px/1.3 'Instrument Serif',serif; font-family: Space Grotesk\">According to Norman, what is the primary reason people struggle with everyday objects?<\u002Fp>\n<div style=\"display:flex;flex-direction:column;gap:2px\">\n<div style=\"position:relative;display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px\">\n<span style=\"flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(23,21,15,.3);display:flex;align-items:center;justify-content:center;font:600 12px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">A<\u002Fspan>\n<span style=\"position:relative;font:500 14.5px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">People misread an object's affordances<span style=\"position:absolute;left:-2px;top:52%;width:calc(100% + 4px);height:2.5px;background:#17150F;transform-origin:left;animation:gx-strike 8s ease-in-out infinite;animation-delay:0s\"><\u002Fspan><\u002Fspan>\n<span style=\"margin-left:auto;font:700 11px 'Space Mono',monospace;color:#524C3E;white-space:nowrap;animation:gx-reason 8s ease-in-out infinite;animation-delay:0s\">exact words, wrong context<\u002Fspan>\n<\u002Fdiv>\n<div style=\"position:relative;display:flex;align-items:center;gap:12px;padding:10px 10px;border-radius:8px;background:rgba(185,214,222,.55)\">\n\n<span style=\"flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid #17150F;display:flex;align-items:center;justify-content:center;font:600 12px 'Space Grotesk',sans-serif\">B<\u002Fspan>\n<span style=\"position:relative;font:500 14.5px 'Space Grotesk',sans-serif\">Poor design of the objects<span style=\"position:absolute;left:0;bottom:-3px;width:100%;height:2px;background:#246A72;transform-origin:left;animation:gx-uline 8s ease-in-out infinite\"><\u002Fspan><\u002Fspan>\n<\u002Fdiv>\n<div style=\"position:relative;display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px\">\n<span style=\"flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(23,21,15,.3);display:flex;align-items:center;justify-content:center;font:600 12px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">C<\u002Fspan>\n<span style=\"position:relative;font:500 14.5px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">Users fail to adapt to good design<span style=\"position:absolute;left:-2px;top:52%;width:calc(100% + 4px);height:2.5px;background:#17150F;transform-origin:left;animation:gx-strike 8s ease-in-out infinite;animation-delay:.45s\"><\u002Fspan><\u002Fspan>\n<span style=\"margin-left:auto;font:700 11px 'Space Mono',monospace;color:#524C3E;white-space:nowrap;animation:gx-reason 8s ease-in-out infinite;animation-delay:.45s\">reverse relationship<\u002Fspan>\n<\u002Fdiv>\n<div style=\"position:relative;display:flex;align-items:center;gap:12px;padding:9px 10px;border-radius:8px\">\n<span style=\"flex:none;width:24px;height:24px;border-radius:50%;border:1.5px solid rgba(23,21,15,.3);display:flex;align-items:center;justify-content:center;font:600 12px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">D<\u002Fspan>\n<span style=\"position:relative;font:500 14.5px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">People feel too frustrated to keep trying<span style=\"position:absolute;left:-2px;top:52%;width:calc(100% + 4px);height:2.5px;background:#17150F;transform-origin:left;animation:gx-strike 8s ease-in-out infinite;animation-delay:.9s\"><\u002Fspan><\u002Fspan>\n<span style=\"margin-left:auto;font:700 11px 'Space Mono',monospace;color:#524C3E;white-space:nowrap;animation:gx-reason 8s ease-in-out infinite;animation-delay:.9s\">interpretation<\u002Fspan>\n<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"margin-top:16px;padding-top:14px;border-top:1px dashed rgba(23,21,15,.25);font:400 13px/1.45 'Space Grotesk',sans-serif;color:rgba(23,21,15,.7)\"><b style=\"color: rgb(36, 106, 114);\">Lisa:<\u002Fb> You almost switched your answer to C, the <b>reverse-relationship<\u002Fb> trap you keep falling for. Eliminate answers by reasoning only about the evidence in the text. That's the skill that transfers.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ PROBLEM / WHY ============ -->\n<div style=\"padding:72px 44px 76px;border-top:1px solid rgba(23,21,15,.12)\">\n<div style=\"display:flex;align-items:center;gap:9px;margin-bottom:14px\">\n<span style=\"width:22px;height:2px;background:#D56A54\"><\u002Fspan>\n<span style=\"font:700 11px 'Space Mono',monospace;letter-spacing:.14em;color:#D56A54\">WHY GNOSIS ACT<\u002Fspan>\n<\u002Fdiv>\n<h2 style=\"margin:0;font:400 46px/1.04 'Instrument Serif',serif;max-width:760px;letter-spacing:-.01em\"><b><span style=\"font-weight: normal;\">The problem isn't what you know. It's <\u002Fspan><\u002Fb><span style=\"position: relative; white-space: nowrap;\"><span style=\"position: absolute; inset: 18% -4px 14%; background: rgb(194, 238, 69); transform: skewX(-4deg); z-index: 0;\"><\u002Fspan><span style=\"position: relative; z-index: 1;\"><b><span style=\"font-weight: normal;\">how you think.<\u002Fspan><\u002Fb><\u002Fspan><\u002Fspan><\u002Fh2>\n<p style=\"margin:24px 0 48px;font:400 17px/1.6 'Space Grotesk',sans-serif;color:rgba(23,21,15,.72);max-width:620px\">Students hit score ceilings not because they lack knowledge, but because they overthink, rush, and second-guess under pressure. Gnosis ACT teaches metacognition — noticing how you think <i>while<\u002Fi> you're thinking. That one skill is the difference between knowing the material and scoring like you know it.<\u002Fp>\n<div style=\"display:grid;grid-template-columns:1fr 1fr 1fr 1.15fr;gap:0;align-items:start\">\n<div style=\"padding-right:30px\">\n<span style=\"display:block;width:14px;height:14px;border-radius:50%;background:#17150F;margin-bottom:22px\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.1em;color:rgba(23,21,15,.5);margin-bottom:7px\">HABIT<\u002Fdiv>\n<div style=\"font:400 21px/1.15 'Instrument Serif',serif\">You overthink the easy ones.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"padding:0 30px;border-left:1px solid rgba(23,21,15,.12)\">\n<span style=\"display:block;width:14px;height:14px;border-radius:50%;background:#17150F;margin-bottom:22px\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.1em;color:rgba(23,21,15,.5);margin-bottom:7px\">HABIT<\u002Fdiv>\n<div style=\"font:400 21px/1.15 'Instrument Serif',serif\">You rush when time is running out.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"padding:0 30px;border-left:1px solid rgba(23,21,15,.12)\">\n<span style=\"display:block;width:14px;height:14px;border-radius:50%;background:#17150F;margin-bottom:22px\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.1em;color:rgba(23,21,15,.5);margin-bottom:7px\">HABIT<\u002Fdiv>\n<div style=\"font:400 21px/1.15 'Instrument Serif',serif\">You second-guess and switch.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"padding-left:30px;border-left:1px solid rgba(23,21,15,.12)\">\n<span style=\"display: block; width: 18px; height: 18px; border-radius: 50%; margin-bottom: 20px; background-color: #246A72\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.1em;color:#246A72;margin-bottom:7px\">→ ONE SKILL<\u002Fdiv>\n<div style=\"font:400 21px/1.15 'Instrument Serif',serif;color:#246A72\">Metacognition: catching it as you do it.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ HOW IT WORKS ============ -->\n<div style=\"padding:64px 44px 72px;border-top:1px solid rgba(23,21,15,.12);background:#ECE6D6\">\n<div style=\"font:700 11px 'Space Mono',monospace;letter-spacing:.14em;color:rgba(23,21,15,.5);margin-bottom:8px\">HOW IT WORKS<\u002Fdiv>\n<h2 style=\"margin:0 0 44px;font:400 40px/1.05 'Instrument Serif',serif;max-width:560px;letter-spacing:-.01em\"><b><span style=\"font-weight: normal;\">How the learning loop works.<\u002Fspan><\u002Fb><\u002Fh2>\n<div style=\"position:relative;display:grid;grid-template-columns:repeat(3,1fr);gap:0\">\n<div style=\"position:absolute;top:8px;left:8%;right:8%;height:2px;background:rgba(23,21,15,.16)\"><\u002Fdiv>\n<div style=\"position:absolute;top:8px;left:8%;width:84%;height:2px;background:#D56A54;transform-origin:left;animation:gx-loop 5s ease-in-out infinite\"><\u002Fdiv>\n<div style=\"padding-right:38px\">\n<span style=\"display:block;width:18px;height:18px;border-radius:50%;background:#D56A54;margin-bottom:26px\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.12em;color:rgba(23,21,15,.5);margin-bottom:7px\">01 · LEARN PROVEN STRATEGIES<\u002Fdiv>\n<div style=\"font:400 24px/1.1 'Instrument Serif',serif;margin-bottom:10px\">Learn proven strategies<\u002Fdiv>\n<p style=\"margin:0;font:400 14.5px/1.55 'Space Grotesk',sans-serif;color:rgba(23,21,15,.68)\">Lisa takes you through a proprietary curriculum with a long track record of student success, then helps shore up your understanding of the strategies.<\u002Fp>\n<\u002Fdiv>\n<div style=\"padding:0 38px;border-left:1px solid rgba(23,21,15,.14)\">\n<span style=\"display:block;width:18px;height:18px;border-radius:50%;background:#17150F;margin-bottom:26px\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.12em;color:rgba(23,21,15,.5);margin-bottom:7px\">02 · PRACTICE WITH REAL ACT MATERIAL<\u002Fdiv>\n<div style=\"font:400 24px/1.1 'Instrument Serif',serif;margin-bottom:10px\">Run it under pressure<\u002Fdiv>\n<p style=\"margin:0;font:400 14.5px/1.55 'Space Grotesk',sans-serif;color:rgba(23,21,15,.68)\">Apply it on real ACT-style passages while Lisa tracks your pacing, hesitations, and answer changes. Every rep builds a picture of how you think.<\u002Fp>\n<\u002Fdiv>\n<div style=\"padding-left:38px;border-left:1px solid rgba(23,21,15,.14)\">\n<span style=\"display:block;width:18px;height:18px;border-radius:50%;background:#246A72;margin-bottom:26px\"><\u002Fspan>\n<div style=\"font:700 10px 'Space Mono',monospace;letter-spacing:.12em;color:rgba(23,21,15,.5);margin-bottom:7px\">03 · COME BACK SMARTER<\u002Fdiv>\n<div style=\"font:400 24px/1.1 'Instrument Serif',serif;margin-bottom:10px\">Learn your hidden testing patterns.<\u002Fdiv>\n<p style=\"margin:0;font:400 14.5px/1.55 'Space Grotesk',sans-serif;color:rgba(23,21,15,.68)\">Lisa builds an evolving profile of how you think and test, then uses that to deliver personalized AI tutoring uniquely fited to you.<\u002Fp>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ BUILT DIFFERENT ============ -->\n<div style=\"padding: 72px 44px 80px; border-top: 1px solid rgba(23,21,15,.12); border-color: #17150F1F\">\n<div style=\"font:700 11px 'Space Mono',monospace;letter-spacing:.14em;color:rgba(23,21,15,.5);margin-bottom:8px\">BUILT DIFFERENT<\u002Fdiv>\n<h2 style=\"margin:0 0 38px;font:400 40px/1.05 'Instrument Serif',serif;max-width:660px;letter-spacing:-.01em\">What Gnosis ACT does that other prep can't.<\u002Fh2>\n<div style=\"display:flex;flex-direction:column\">\n<div style=\"display:grid;grid-template-columns:1.1fr 1.5fr;gap:38px;align-items:start;padding:24px 0;border-top:1px solid rgba(23,21,15,.16)\">\n<div style=\"font:500 17px/1.4 'Space Grotesk',sans-serif;color:rgba(23,21,15,.5)\"><span style=\"font:700 9.5px 'Space Mono',monospace;letter-spacing:.1em;display:block;margin-bottom:6px;color:rgba(23,21,15,.4)\">WHAT YOU GET NOW<\u002Fspan>\"You got 7 out of 10 correct.\"<\u002Fdiv>\n<div style=\"font:400 20px/1.35 'Instrument Serif',serif\"><span style=\"font-family:'Space Mono';font-weight:700;font-size:9.5px;letter-spacing:.1em;display:block;margin-bottom:6px;color:#D56A54\">WHAT GNOSIS ACT DOES<\u002Fspan>\"You changed 2 correct answers to wrong ones. <span style=\"background-image:linear-gradient(to right, rgba(194,238,69,.6) 50%, rgba(194,238,69,0) 50%);background-repeat:no-repeat;background-size:200% 100%;background-position:100% 0;-webkit-box-decoration-break:clone;box-decoration-break:clone;animation:gx-markbg 5.5s ease-in-out infinite;padding:0 2px\">Here's the pattern — and here's how to break it.<\u002Fspan>\"<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1.1fr 1.5fr;gap:38px;align-items:start;padding:24px 0;border-top:1px solid rgba(23,21,15,.16)\">\n<div style=\"font:500 17px/1.4 'Space Grotesk',sans-serif;color:rgba(23,21,15,.5)\"><span style=\"font:700 9.5px 'Space Mono',monospace;letter-spacing:.1em;display:block;margin-bottom:6px;color:rgba(23,21,15,.4)\">WHAT YOU GET NOW<\u002Fspan>More practice questions.<\u002Fdiv>\n<div style=\"font:400 20px/1.35 'Instrument Serif',serif\"><span style=\"font-family:'Space Mono';font-weight:700;font-size:9.5px;letter-spacing:.1em;display:block;margin-bottom:6px;color:#D56A54\">WHAT GNOSIS ACT DOES<\u002Fspan>A curriculum that teaches you how to think, not just what to answer.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1.1fr 1.5fr;gap:38px;align-items:start;padding:24px 0;border-top:1px solid rgba(23,21,15,.16)\">\n<div style=\"font:500 17px/1.4 'Space Grotesk',sans-serif;color:rgba(23,21,15,.5)\"><span style=\"font:700 9.5px 'Space Mono',monospace;letter-spacing:.1em;display:block;margin-bottom:6px;color:rgba(23,21,15,.4)\">WHAT YOU GET NOW<\u002Fspan>Generic study tips for everyone.<\u002Fdiv>\n<div style=\"font:400 20px/1.35 'Instrument Serif',serif\"><span style=\"font-family:'Space Mono';font-weight:700;font-size:9.5px;letter-spacing:.1em;display:block;margin-bottom:6px;color:#D56A54\">WHAT GNOSIS ACT DOES<\u002Fspan>Strategies tailored to your specific patterns and failure modes.<\u002Fdiv>\n<\u002Fdiv>\n<div style=\"display:grid;grid-template-columns:1.1fr 1.5fr;gap:38px;align-items:start;padding:24px 0;border-top:1px solid rgba(23,21,15,.16);border-bottom:1px solid rgba(23,21,15,.16)\">\n<div style=\"font:500 17px/1.4 'Space Grotesk',sans-serif;color:rgba(23,21,15,.5)\"><span style=\"font:700 9.5px 'Space Mono',monospace;letter-spacing:.1em;display:block;margin-bottom:6px;color:rgba(23,21,15,.4)\">WHAT YOU GET NOW<\u002Fspan>Starting from scratch every session.<\u002Fdiv>\n<div style=\"font:400 20px/1.35 'Instrument Serif',serif\"><span style=\"font-family:'Space Mono';font-weight:700;font-size:9.5px;letter-spacing:.1em;display:block;margin-bottom:6px;color:#D56A54\">WHAT GNOSIS ACT DOES<\u002Fspan>A tutor who remembers everything and picks up where you left off.<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ CLOSING CTA ============ -->\n<div style=\"padding:84px 44px 80px;background:#17150F;color:#F4F1E8;text-align:center\">\n<h2 style=\"margin:0 auto;font:400 46px/1.08 'Instrument Serif',serif;max-width:740px;letter-spacing:-.01em\">Elite tutoring expertise. No scheduling. <span style=\"position:relative;white-space:nowrap\"><span style=\"position:absolute;left:-5px;right:-5px;top:14%;bottom:12%;background:#C2EE45;transform:skewX(-4deg);z-index:0\"><\u002Fspan><span style=\"position:relative;z-index:1;color:#17150F\">No $150/hr price tag.<\u002Fspan><\u002Fspan><\u002Fh2>\n<p style=\"margin:26px auto 0;font:400 16px/1.6 'Space Grotesk',sans-serif;color:rgba(244,241,232,.72);max-width:600px\">The best private tutors teach exactly what Gnosis ACT teaches — how to notice your own patterns, apply specific strategies, and perform under pressure. They cost $80 to $150 an hour and see a handful of students. Gnosis ACT makes that caliber of coaching available to everyone.<\u002Fp>\n<div style=\"display:flex;align-items:center;gap:0;margin:36px auto 0;max-width:460px;border:1.5px solid rgba(244,241,232,.4);border-radius:10px;overflow:hidden;background:rgba(244,241,232,.06)\">\n<input id=\"gx-email\" type=\"email\" placeholder=\"Enter your email\" style=\"flex: 1; min-width: 0; padding: 15px 16px; background-color: #F4F1E8; color: #17150F\">\n<span style=\"font: 600 14px 'Space Grotesk',sans-serif; color: #FFFFFF; background: #D56A54; padding: 15px 24px; white-space: nowrap; font-size: 18px\">Join the waitlist →<\u002Fspan>\n<\u002Fdiv>\n<div style=\"margin-top:16px;font:400 12px 'Space Mono',monospace;letter-spacing:.03em;color:rgba(244,241,232,.5)\">▪ Limited beta spots<\u002Fdiv>\n<\u002Fdiv>\n\n<!-- ============ FOOTER ============ -->\n<div style=\"display:flex;align-items:center;justify-content:space-between;padding:30px 44px;background:#F4F1E8;border-top:1px solid rgba(23,21,15,.12)\">\n<div style=\"display:flex;align-items:center;gap:10px\">\n<span style=\"font:400 18px 'Instrument Serif',serif\">Gnosis<\u002Fspan>\n<span style=\"font:700 9px 'Space Mono',monospace;letter-spacing:.1em;padding:2px 5px;background:#17150F;color:#F4F1E8;border-radius:4px\">ACT<\u002Fspan>\n<span style=\"margin-left:14px;font:400 12.5px 'Space Grotesk',sans-serif;color:rgba(23,21,15,.55)\">AI tutoring that adapts to how you learn.<\u002Fspan>\n<\u002Fdiv>\n<div style=\"text-align:right;font:400 11px 'Space Mono',monospace;letter-spacing:.02em;color:rgba(23,21,15,.45);line-height:1.6\">Built by educators with a decade of ACT coaching experience.<br>© 2025 Gnosis ACT<\u002Fdiv>\n<\u002Fdiv>\n\n<\u002Fdiv>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\">\nclass Component extends DCLogic {\n  fit() {\n    const page = document.getElementById('gx-page');\n    if (!page) return;\n    const scale = Math.round(Math.min(1, window.innerWidth / 1200) * 1000) / 1000;\n    if (this._lastScale === scale) return;\n    this._lastScale = scale;\n    page.style.zoom = scale;\n  }\n  componentDidMount() {\n    this.fit();\n    this._onResize = () => { if (this._raf) return; this._raf = requestAnimationFrame(() => { this._raf = null; this.fit(); }); };\n    window.addEventListener('resize', this._onResize);\n    setTimeout(() => this.fit(), 300);\n  }\n  componentWillUnmount() { window.removeEventListener('resize', this._onResize); }\n  renderVals() { return {}; }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
